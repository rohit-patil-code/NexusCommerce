server:
  port: 8085

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://127.0.0.1:5436/user_db
    username: user_service
    password: user_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}

eureka:
  instance:
    preferIpAddress: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
